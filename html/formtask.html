<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Form</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form action="">
      <label for="firstname">First Name:</label>
      <input
        type="text"
        id="firstname"
        name="firstname"
        placeholder="Enter First Name"
      /><br />
      <label for="lastname">Last Name:</label>
      <input
        type="text"
        id="lastname"
        name="lastname"
        placeholder="Enter Last Name"
      /><br />
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter Email Address"
      /><br />
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" /><br />
      <label>Gender:</label><br />
      <label for="male">Male</label>
      <input type="radio" name="gender" id="male" value="male" /><br />

      <label for="female">Female</label>
      <input type="radio" name="gender" id="female" value="female" /><br />
      <label for="other">Others</label>
      <input type="radio" name="gender" id="other" value="other" /><br />
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" /><br />
      <label>Preferences:</label><br />
      <input type="checkbox" id="" name="preferences" value="" />
      <label for="arcylic painting">Arcylic Painting</label><br />
      <input type="checkbox" id="" name="preferences" value="" />
      <label for="oil painting">Oil Painting</label><br />
      <input type="checkbox" name="preferences" id="oil-painting" />
      <label for="water color ">Water Color Painting</label><br />
      <label for="occupation">Select Occupation:</label>
      <select name="occupation" id="occupation">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="engineer">Engineer</option></select
      ><br />
      <label for="msg">Bio:</label>
      <textarea
        id="msg"
        name="msg"
        placeholder="Share few lines about yourself......"
        rows="5"
        cols="50"
      ></textarea
      ><br />

      <input type="submit" id="submit" value="Submit" />
      <input type="reset" id="reset" value="Reset" />
    </form>
    <br />
    <hr />
  </body>

  </body>
</html>
