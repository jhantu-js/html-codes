<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Document</title>
  </head>
  <body>
    <form action="" method="get">
      <br />
      <label for="text">First Name</label>
      <input
        type="text"
        name="first_name"
        id="Enter your first name"
        placeholder="Enter your first name"
      /><br /><br />

      <label for="email">Email</label>
      <input
        type="email"
        name="mail"
        id="email"
        placeholder="Enter your Email"
      /><br /><br />

      <label for="password">Password</label>
      <input
        type="password"
        name="pwd"
        id="pwd"
        placeholder="Enter your password"
      /><br /><br />

      <label for="Date">Date of Birth</label>
      <input type="date" name="dob" id="dob" /><br /><br />

      <label for="Time">Time</label>
      <input type="time" name="time" id="time" /><br /><br />

      <label for="Number">Number</label>
      <input type="number" name="Number" id="Number" min="0" max="100" />
      <br /><br />

      <label for="url">Website</label>
      <input
        type="url"
        name="url"
        id="url"
        placeholder="Enter your website"
      /><br /><br />

      <label for="Image">Profile Image</label>
      <input
        type="image"
        src="./Task/assets/4e174583-35fd-4191-8d87-b78310b57a3f.jpg"
        alt="Ganesh Ji"
        name="profile image"
        id="profile image"
        height="200"
        width="200"
      />
      <br /><br />

      <label for="Button">Click Me</label>
      <input
        type="button"
        value="Click Me"
        name="button"
        id="button"
      /><br /><br />

      <label for="submit">Submit</label>
      <input type="submit" value="Submit" name="submit" id="submit" />
      <br /><br />

      <label for="reset">Reset</label>
      <input type="reset" value="reset" name="reset" id="reset" /><br /><br />

      <label for="search">Search Me</label>
      <input
        type="search"
        name="search"
        id="search"
        placeholder="Search Me..............."
      /><br /><br />

      <label for="color">Color</label>
      <input type="color" name="color" id="color" /><br /><br />

      <label for="range">Range</label>
      <input
        type="range"
        name="range"
        id="range"
        min="0"
        max="100"
      /><br /><br />

      <label for="file">Upload File</label>
      <input type="file" name="file_name" id="file" /><br /><br />

      <label for="urlsite">Website</label>
      <input
        type="url"
        name="site_name"
        id="sitename"
        placeholder="Enter your site"
      /><br /><br />

      <label for="textarea">Description</label>
      <textarea
        name="description"
        id="description"
        placeholder="Enter a description"
      ></textarea
      ><br /><br />

      <label for="select">Select an option</label>
      <select name="options" id="options">
        <option value="option1">Option 1</option>
        <option value="option2">Option 2</option>
        <option value="option3">Option 3</option>
        <option value="option4">Option 4</option>
      </select>

      <label for="tel">Telephone Number</label>
      <input type="tel" name="telephone_number" id="tel" placeholder="Enter your telephone number" /><br /><br />

      <label for="hidden">Hidden Field</label>
      <input type="hidden" name="hidden" id="hidden" /> <br><br>

      <label for="checkbox">Check this box</label>
      <input type="checkbox" name="checkbox" id="checkbox" /><br><br>

      <label for="you_are_amazing">You are Amazing</label>
      <input type="text" name="You are Amazing" id="you_are_amazing" />
    </form>
  </body>
</html>
