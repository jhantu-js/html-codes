<html>
  <head>
    <title>table with colspan and rowspan</title>
  </head>
  <body>
    <table border="2" cellspacing="0" cellpadding="10">
      <thead>
        <tr>
          <th colspan="3">Information</th>
        </tr>
        <tr>
          <th colspan="2">Fullname</th>
          <th>Contact</th>
        </tr>
        <tr>
          <th>Firstname</th>
          <th>Lastname</th>
          <th>Mobile</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Jhantu</td>
          <td>Pathak</td>
          <td>7004188190</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
