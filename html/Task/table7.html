<html>
  <head>
    <title>Colour Table</title>
    <style>
      caption {
        font-size: 50px;
        color: seagreen;
      }
      td {
        background-color: yellowgreen;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <caption>
      <b>Colour Table</b>
    </caption>
    <table border="1" cellspacing="0" cellpadding="15">
      <tbody>
        <tr>
          <td rowspan="2">no</td>
          <td>problem</td>
          <td>for</td>
          <td>a web</td>
        </tr>
        <tr>
          <td>professional</td>
          <td colspan="2" rowspan="3">as</td>
        </tr>
        <tr>
          <td colspan="2">you</td>
        </tr>
        <tr>
          <td>will</td>
          <td rowspan="2">see</td>
        </tr>
        <tr>
          <td>in</td>
          <td>a few</td>
          <td>minutes!</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
