<html>
  <head>
    <title>Invoice</title>
  </head>

  <body>
    <table border="3" cellspacing="0" cellpadding="10">
      <caption>
        Invoice
      </caption>
      <thead>
        <tr>
          <th colspan="1">Item / Desc.</th>
          <th>Qty.</th>
          <th>@</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Paperclips(Box)</td>
          <td>100</td>
          <td>1.15</td>
          <td>115.00</td>
        </tr>
        <tr>
          <td>Paper(Case)</td>
          <td>10</td>
          <td>45.99</td>
          <td>459.90</td>
        </tr>
        <tr>
          <td>Wastepaper Baskets</td>
          <td>2</td>
          <td>17.99</td>
          <td>35.98</td>
        </tr>
        <tr>
          <td colspan="3"><b>Subtotal</b></td>
          <td><b>610.88</b></td>
        </tr>
        <tr>
          <td colspan="2"><b>Tax</b></td>
          <td><b>7%</b></td>
          <td><b>42.76</b></td>
        </tr>
        <tr>
          <td colspan="3"><b>Total</b></td>
          <td><b>653.64</b></td>
        </tr>
      </tbody>
    </table>
    <br />
    <hr />
    <table border="2" cellspacing="0" cellpadding="10">
      <thead>
        <tr>
          <th>Name</th>
          <th>Contact</th>
          <th>City</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="2">John</td>
          <td>1234</td>
          <td rowspan="2">Kolkata</td>
        </tr>
        <tr>
          <td>3456</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
