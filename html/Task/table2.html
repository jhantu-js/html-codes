<html>
  <head>
    <title>Editable Table</title>
  </head>
  <p>
    <b><strong>Editable Table Example</strong></b>
  </p>
  <body>
    <table border="5" cellspacing="0" cellpadding="10">
      <thead>
        <tr>
          <th>#</th>
          <th>Make</th>
          <th>Model</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Honda</td>
          <td>Accord</td>
          <td>2009</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Toyoto</td>
          <td>Camry</td>
          <td>2012</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Hyundai</td>
          <td>Elantra</td>
          <td>2010</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
